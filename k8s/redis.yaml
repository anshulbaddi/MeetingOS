# ── Redis ───────────────────────────────────────────────────────────────────────
# Single-replica StatefulSet with a 5 Gi PVC.
# Redis is only reachable inside the cluster (ClusterIP) — not exposed externally.
# KEDA reads queue depth from this instance to drive worker autoscaling.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: meetingos
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: meetingos
spec:
  clusterIP: None   # Headless — StatefulSet pods address directly by DNS
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
