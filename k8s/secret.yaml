# ── Secret template ────────────────────────────────────────────────────────────
# Do NOT commit real values. Generate this from your .env files:
#
#   kubectl create secret generic meetingos-secrets -n meetingos \
#     --from-literal=DATABASE_URL="postgresql://..." \
#     --from-literal=OPENAI_API_KEY="sk-..." \
#     --from-literal=NEXTAUTH_SECRET="..." \
#     --from-literal=AUTH_SECRET="..." \
#     --from-literal=GOOGLE_CLIENT_ID="..." \
#     --from-literal=GOOGLE_CLIENT_SECRET="..." \
#     --from-literal=HF_TOKEN="hf_..." \
#     --from-literal=S3_ENDPOINT_URL="https://..." \
#     --from-literal=S3_ACCESS_KEY_ID="..." \
#     --from-literal=S3_SECRET_ACCESS_KEY="..." \
#     --from-literal=S3_BUCKET_NAME="meeting-recordings" \
#     --from-literal=R2_PUBLIC_URL="https://pub-....r2.dev" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# The placeholder below shows the expected shape only.
apiVersion: v1
kind: Secret
metadata:
  name: meetingos-secrets
  namespace: meetingos
type: Opaque
stringData:
  DATABASE_URL: "<neon-postgres-connection-string>"
  OPENAI_API_KEY: "<sk-...>"
  NEXTAUTH_SECRET: "<random-32-char-string>"
  AUTH_SECRET: "<same-as-NEXTAUTH_SECRET>"
  GOOGLE_CLIENT_ID: "<google-oauth-client-id>"
  GOOGLE_CLIENT_SECRET: "<google-oauth-client-secret>"
  HF_TOKEN: "<hf_...>"
  S3_ENDPOINT_URL: "<r2-endpoint-url>"
  S3_ACCESS_KEY_ID: "<r2-access-key>"
  S3_SECRET_ACCESS_KEY: "<r2-secret-key>"
  S3_BUCKET_NAME: "meeting-recordings"
  R2_PUBLIC_URL: "<r2-public-url>"
